# 掛率設定 - 掛率.xlsx「テーブル」シート F列 (20231001より) の値
# ※ 値が未設定(null)の場合はエラーになります

# H仕切り掛率
h_sikiri:
  M:
    # M番は価格帯で掛率が変わる
    band1_threshold: 500       # テーブルシートE3: この金額以下 → rate_M1を使用
    band2_threshold: 5000      # テーブルシートE4: この金額以下 → rate_M2を使用 (超えたらrate_M3)
    band3_threshold: 5000      # テーブルシートD5: M3適用の下限値
    rate_M1: 3.465             # テーブルシートF3
    rate_M2: 3.465             # テーブルシートF4
    rate_M3: 2.8875            # テーブルシートF5
  "4": 1.5246                  # テーブルシートF10
  E: 1.5246                    # テーブルシートF19 (F番も同じ掛率)
  A: 0.85                      # テーブルシートF27 (※除算で使用)
  L: 1.5246                    # テーブルシートF32
  CV: 1.5246                   # テーブルシートF36
  UM: 1.5246                   # テーブルシートF40
  P: 1.5246                    # テーブルシートF23

# 製造原価パラメータ
manufacturing:
  up_rate: 1.29                # テーブルシートA3 (UP)
  charge_rate: 3737            # テーブルシートB3 (チャージ)

# ECO H仕切りとの価格比較 (VBA: Y1セル)
price_comparison_rate: 1.3

# 価格チェーン (HI仕切→仮上代→D仕切→上代)
price_chain:
  hi_sikiri:
    var1: 0.52                 # テーブルシートF51
    var2: 0.57                 # テーブルシートF52
    var3: 1.05                 # テーブルシートF53
  kari_jyoudai:
    var1: 0.52                 # テーブルシートF57
    var2: 1.05                 # テーブルシートF58
    var3: 1.05                 # テーブルシートF59 (4番以外)
    var4: 1.3068               # テーブルシートF60 (4番以外)
  dealer_sikiri:
    var1: 1.1                  # テーブルシートF63 (Ver.8.0: 1.155→1.1)
  jyoudai:
    band1_threshold: 15000     # テーブルシートE71
    band2_threshold: 40000     # テーブルシートE72
    rate1: 1.5                 # テーブルシートF71 (< band1)
    rate2: 1.3                 # テーブルシートF72 (band1 <= x < band2)
    rate3: 1.2                 # テーブルシートF73 (>= band2)
